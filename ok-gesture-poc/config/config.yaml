# OK Sign Gesture Detection - Project Configuration

# Model Configuration
model:
  name: "yolov8n"  # Options: yolov8n, yolov8s, yolov8m
  pretrained: true
  classes:
    - person
    - ok_sign
  
# Training Configuration
training:
  epochs: 150
  batch_size: 16
  imgsz: 640
  patience: 20
  device: 0  # GPU device, use 'cpu' for CPU training
  workers: 8
  
  # Augmentation
  augment: true
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  bgr: 0.0
  
  # Optimizer
  optimizer: "SGD"
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  
# SAHI Configuration (Small Object Detection)
sahi:
  enabled: true
  slice_height: 640
  slice_width: 640
  overlap_height_ratio: 0.25
  overlap_width_ratio: 0.25
  postprocess_type: "NMS"
  postprocess_match_threshold: 0.5
  
# Tracking Configuration
tracking:
  tracker: "ByteTrack"
  track_thresh: 0.5
  track_buffer: 30
  match_thresh: 0.8
  
# Inference Configuration
inference:
  confidence_threshold: 0.3
  iou_threshold: 0.45
  max_det: 300
  
# Camera Configuration
camera:
  source: 0  # 0 for default webcam, or path to video file
  width: 1280
  height: 720
  fps: 30
  
# Calibration Configuration
calibration:
  calibration_file: "calibration/homography_matrix.npy"
  world_points_file: "calibration/world_points.json"
  
# Output Configuration
output:
  save_detections: false
  output_dir: "outputs"
  log_format: "json"  # json, csv
  
# Performance
performance:
  target_fps: 24
  enable_half_precision: true
  use_openvino: false  # Set to true for Intel N100
